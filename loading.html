<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayStation Boot</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    .container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .sie-text {
        position: absolute;
        top: 8vh;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: clamp(10px, 1.2vw, 14px);
        font-weight: 300;
        letter-spacing: 0.15em;
        opacity: 0;
        animation: fadeIn 2s ease-in forwards;
        animation-delay: 0.5s;
        white-space: nowrap;
    }

    .ps-symbols {
        display: flex;
        gap: clamp(2rem, 8vw, 6rem);
        align-items: center;
        justify-content: center;
        opacity: 0;
        animation: fadeInOut 3s ease-in-out forwards;
        animation-delay: 1.5s;
    }

    .symbol {
        color: #fff;
        font-size: clamp(3rem, 12vw, 8rem);
        font-weight: 200;
        line-height: 1;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .symbol.triangle {
        font-size: clamp(2.7rem, 11vw, 7.2rem);
        transform: translateY(-0.05em);
    }

    .progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 2px;
        width: 0;
        background: linear-gradient(90deg, #0070d1, #00a8ff);
        box-shadow: 0 0 10px rgba(0, 112, 209, 0.8);
        animation: progressFill 15s linear forwards;
        z-index: 9999;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateX(-50%) translateY(-10px);
        }
        to {
            opacity: 0.9;
            transform: translateX(-50%) translateY(0);
        }
    }

    @keyframes fadeInOut {
        0% {
            opacity: 0;
            transform: scale(0.95);
        }
        20% {
            opacity: 1;
            transform: scale(1);
        }
        80% {
            opacity: 1;
            transform: scale(1);
        }
        100% {
            opacity: 0;
            transform: scale(1.02);
        }
    }

    @keyframes progressFill {
        from {
            width: 0;
        }
        to {
            width: 100vw;
        }
    }

    /* Remove tap highlight on TV/Android boxes */
    * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
    }

    /* TV overscan safety for MXQ boxes */
    @media (min-width: 1920px) {
        .container {
            padding: 5vh 5vw;
        }
    }
</style>
</head>
<body>
    <div class="progress-bar"></div>
    <div class="container">
        <div class="sie-text">ICI Infor.Corporation.Inc</div>
        <div class="ps-symbols">
            <span class="symbol">◯</span>
            <span class="symbol">✕</span>
            <span class="symbol">□</span>
            <span class="symbol triangle">△</span>
        </div>
    </div>

    <script>
        const LINK_DESTINO = "https://example.com"; // Replace with your target URL

        // Request fullscreen on load for MXQ TV box
        function requestFullScreen() {
            const elem = document.documentElement;
            try {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) { // Safari
                    elem.webkitRequestFullscreen();
                } else if (elem.mozRequestFullScreen) { // Firefox
                    elem.mozRequestFullScreen();
                } else if (elem.msRequestFullscreen) { // IE/Edge
                    elem.msRequestFullscreen();
                }
            } catch (e) {
                console.log("Fullscreen request failed:", e);
            }
        }

        // Trigger fullscreen on any user interaction or auto-try on load
        document.addEventListener('DOMContentLoaded', function() {
            // Auto-try fullscreen
            setTimeout(requestFullScreen, 100);
            
            // Fallback: request on click/touch for boxes that block auto fullscreen
            document.body.addEventListener('click', requestFullScreen);
            document.body.addEventListener('touchstart', requestFullScreen);
            document.body.addEventListener('keydown', requestFullScreen);
        });

        // Redirect after 15 seconds
        setTimeout(function() {
            window.location.href = https:longer-thumb-reuters-drill.trycloudflare.com/ici/storage/icistation/dist/;
        }, 15000);

        // Prevent context menu on TV boxes
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Hide cursor for TV experience
        document.body.style.cursor = 'none';
    </script>

</body>
</html>
