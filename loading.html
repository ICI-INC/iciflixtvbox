<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PS5 Loading Experience</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000000;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  
  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Handle TV overscan with safe areas */
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    padding-left: env(safe-area-inset-left, 0px);
    padding-right: env(safe-area-inset-right, 0px);
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    /* Secondary overscan guard: 95vw/95vh centered for TVs without safe-area support */
    width: 95vw;
    height: 95vh;
    max-width: 100vw;
    max-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .ps-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(600px, 60vmin);
    height: min(600px, 60vmin);
    background: radial-gradient(circle, rgba(0, 112, 255, 0.08) 0%, rgba(0, 112, 255, 0.03) 30%, transparent 70%);
    animation: breathe 4s ease-in-out infinite;
    pointer-events: none;
  }
  
  @keyframes breathe {
    0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); }
    50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
  }
  
  .particles {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    overflow: hidden;
    pointer-events: none;
  }
  
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: float 20s infinite linear;
  }
  
  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
  }
  
  .ps5-shapes {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -15vh);
    display: flex;
    gap: clamp(12px, 2vw, 24px);
    opacity: 0;
    animation: fadeInShapes 1s ease-out 0.5s forwards;
  }
  
  @keyframes fadeInShapes {
    to { opacity: 0.9; }
  }
  
  .ps-symbol {
    width: clamp(24px, 3vw, 36px);
    height: clamp(24px, 3vw, 36px);
    opacity: 0;
    animation: symbolPulse 3s ease-in-out infinite;
  }
  
  .ps-symbol:nth-child(1) { animation-delay: 0s; }
  .ps-symbol:nth-child(2) { animation-delay: 0.3s; }
  .ps-symbol:nth-child(3) { animation-delay: 0.6s; }
  .ps-symbol:nth-child(4) { animation-delay: 0.9s; }
  
  @keyframes symbolPulse {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.1); }
  }
  
  .loading-container {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  
  .content-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(24px, 4vh, 48px);
    width: 100%;
    max-width: min(400px, 80vw);
  }
  
  .spinner {
    width: clamp(40px, 5vw, 48px);
    height: clamp(40px, 5vw, 48px);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-top: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  }
  
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  
  .progress-bar-container {
    position: relative;
    width: 100%;
    max-width: min(280px, 70vw);
    height: 2px;
    background: rgba(255, 255, 255, 0.1);
    overflow: hidden;
    border-radius: 1px;
  }
  
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, 
      rgba(255, 255, 255, 0.3) 0%, 
      rgba(255, 255, 255, 0.9) 50%, 
      rgba(0, 112, 255, 0.9) 100%
    );
    box-shadow: 0 0 20px rgba(0, 112, 255, 0.6);
    transition: width 0.1s linear;
  }
  
  .progress-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: min(280px, 70vw);
  }
  
  .fade-out {
    animation: fadeOut 0.8s ease-out forwards;
  }
  
  @keyframes fadeOut {
    to { opacity: 0; }
  }
  
  .copyright-text {
    position: absolute;
    bottom: clamp(20px, 4vh, 40px);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(9px, 1.2vw, 10px);
    color: rgba(255, 255, 255, 0.3);
    font-weight: 200;
    letter-spacing: 0.5px;
    text-align: center;
    padding: 0 1rem;
    width: 100%;
    max-width: 90vw;
  }

  /* TV Box specific optimizations */
  @media (min-width: 1280px) and (min-height: 720px) {
    .ps-glow {
      width: min(800px, 40vw);
      height: min(800px, 40vw);
    }
    .content-wrapper {
      max-width: min(500px, 50vw);
    }
  }

  /* 4K Optimizations */
  @media (min-width: 3840px) {
    .spinner {
      width: 96px;
      height: 96px;
      border-width: 4px;
    }
    .progress-bar-container {
      height: 4px;
      max-width: 560px;
    }
    .progress-info {
      max-width: 560px;
    }
    .copyright-text {
      font-size: 20px;
    }
    #loadingText, #percentage {
      font-size: 24px;
    }
  }

  /* Mobile optimizations */
  @media (max-width: 640px) {
    .ps5-shapes {
      transform: translate(-50%, -12vh);
    }
  }
  
  /* Ensure no horizontal scroll on any device */
  * {
    max-width: 100vw;
  }
</style>
</head>
<body>
  <div id="app">
    <div class="ps-glow"></div>
    <div class="particles" id="particles"></div>
    
    <div class="ps5-shapes">
      <svg class="ps-symbol" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
      </svg>
      <svg class="ps-symbol" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"></circle>
      </svg>
      <svg class="ps-symbol" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <line x1="6" y1="6" x2="18" y2="18"></line>
        <line x1="18" y1="6" x2="6" y2="18"></line>
      </svg>
      <svg class="ps-symbol" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
      </svg>
    </div>
    
    <main class="loading-container">
      <div class="content-wrapper">
        <div class="spinner"></div>
        
        <div class="w-full flex flex-col items-center gap-4">
          <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressBar"></div>
          </div>
          
          <div class="progress-info">
            <p class="text-white/40 text-xs font-light tracking-widest" id="loadingText">LOADING</p>
            <p class="text-white/60 text-xs font-light tabular-nums" id="percentage">0%</p>
          </div>
        </div>
      </div>
      
      <p class="copyright-text">
        Sony Interactive Entertainment
      </p>
    </main>
  </div>

<script>
  // CONFIG: Replace this URL with your destination link
  const REDIRECT_URL = 'https://longer-thumb-reuters-drill.trycloudflare.com/ici/storage/icistation/dist/';
  
  const LOADING_DURATION = 15000; // 15 seconds in milliseconds
  const UPDATE_INTERVAL = 100; // Update every 100ms for smooth progress
  const totalSteps = LOADING_DURATION / UPDATE_INTERVAL;
  
  let currentStep = 0;
  const progressBar = document.getElementById('progressBar');
  const percentageText = document.getElementById('percentage');
  const loadingText = document.getElementById('loadingText');
  const particlesContainer = document.getElementById('particles');
  
  // Create ambient particles - scale count with screen size
  const particleCount = window.innerWidth >= 1920 ? 50 : 30;
  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 20 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    particlesContainer.appendChild(particle);
  }
  
  // Loading text animation like PS5
  const loadingStates = ['LOADING', 'LOADING.', 'LOADING..', 'LOADING...'];
  let textIndex = 0;
  
  setInterval(() => {
    loadingText.textContent = loadingStates[textIndex];
    textIndex = (textIndex + 1) % loadingStates.length;
  }, 500);
  
  // Progress bar animation
  const progressInterval = setInterval(() => {
    currentStep++;
    const progress = (currentStep / totalSteps) * 100;
    const clampedProgress = Math.min(progress, 100);
    
    progressBar.style.width = clampedProgress + '%';
    percentageText.textContent = Math.floor(clampedProgress) + '%';
    
    if (currentStep >= totalSteps) {
      clearInterval(progressInterval);
      percentageText.textContent = '100%';
      
      // Fade out before redirect
      setTimeout(() => {
        document.body.classList.add('fade-out');
        setTimeout(() => {
          window.location.href = REDIRECT_URL;
        }, 800);
      }, 500);
    }
  }, UPDATE_INTERVAL);

  // Handle TV remote/keyboard skip with Enter or OK button
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      window.location.href = REDIRECT_URL;
    }
  });

  // Prevent context menu on TV boxes
  window.addEventListener('contextmenu', (e) => e.preventDefault());
  
  // Force fullscreen on load for TV boxes
  document.addEventListener('DOMContentLoaded', () => {
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
  });
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
